<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecânico IA Pro v2.5</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; font-weight: 800; letter-spacing: -1px; }
        
        .form-group { background: #334155; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; margin-bottom: 15px; outline: none; }
        select:focus, input:focus { border-color: var(--primary); }
        
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        button:hover { background: #38bdf8; transform: translateY(-1px); }
        button:disabled { background: #64748b; cursor: not-allowed; transform: none; }

        /* Estilo do Loading */
        .loader-container { display: none; text-align: center; margin: 20px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultArea { margin-top: 30px; padding: 25px; border-radius: 16px; background: #f8fafc; color: #1e293b; display: none; border-left: 6px solid var(--primary); }
        
        /* Chat de Seguimento */
        .chat-section { margin-top: 25px; display: none; border-top: 1px solid #334155; padding-top: 20px; }
        .chat-history { background: #0f172a; border-radius: 12px; padding: 15px; max-height: 300px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #334155; }
        .msg { margin-bottom: 15px; font-size: 0.95rem; line-height: 1.4; color: #cbd5e1; }
        .msg-user { color: var(--primary); font-weight: bold; }
        
        .error { background: #ef4444; color: white; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; }
        footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔧 Mecânico IA Especialista</h1>
    
    <div class="form-group">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Fabricante:</label>
                <select id="brand"><option value="">Carregando marcas...</option></select>
            </div>
            <div>
                <label>Modelo:</label>
                <select id="model" disabled><option>Selecione a marca</option></select>
            </div>
        </div>

        <label>Código de Falha (DTC):</label>
        <input type="text" id="dtc" placeholder="Ex: P0420, P0171, P0300..." value="">
        
        <button id="btnRun">ANALISAR FALHA AGORA</button>
    </div>

    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <div id="statusText">IA está consultando manuais técnicos...</div>
    </div>

    <div id="errorMsg" class="error"></div>

    <div id="resultArea">
        <div id="output"></div>
    </div>

    <div id="chatSection" class="chat-section">
        <label>💬 Dúvida sobre este diagnóstico?</label>
        <div id="chatHistory" class="chat-history"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Ex: Qual o valor médio dessa peça?" style="margin:0">
            <button id="btnChat" style="width: 120px; margin:0; font-size: 0.9rem;">Perguntar</button>
        </div>
    </div>

    <footer>
        Processamento via Gemini 2.5 Flash | Dados Técnicos 2026
    </footer>
</div>

<script>
    // CONFIGURAÇÃO: COLOQUE SUA CHAVE ABAIXO
    const MINHA_CHAVE = "AIzaSyDifEiasbUP7YVigrigpHPul5F3jVJWV7I"; // Insira aqui sua chave

    const brandSel = document.getElementById('brand');
    const modelSel = document.getElementById('model');
    const btn = document.getElementById('btnRun');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const output = document.getElementById('output');
    const chatSection = document.getElementById('chatSection');
    const chatHistory = document.getElementById('chatHistory');

    let historicoContexto = [];

    // Busca Marcas FIPE
    async function initFipe() {
        try {
            const res = await fetch('https://parallelum.com.br/fipe/api/v1/carros/marcas');
            const data = await res.json();
            brandSel.innerHTML = '<option value="">Selecione a Marca</option>';
            data.forEach(m => brandSel.innerHTML += `<option value="${m.codigo}">${m.nome}</option>`);
        } catch (e) { console.error("Falha ao carregar FIPE"); }
    }

    brandSel.onchange = async () => {
        if(!brandSel.value) return;
        modelSel.disabled = true;
        modelSel.innerHTML = '<option>Buscando modelos...</option>';
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${brandSel.value}/modelos`);
        const data = await res.json();
        modelSel.innerHTML = '<option value="">Selecione o Modelo</option>';
        data.modelos.forEach(m => modelSel.innerHTML += `<option value="${m.nome}">${m.nome}</option>`);
        modelSel.disabled = false;
    };

    // Função de comunicação com a IA
    async function enviarParaIA(mensagens) {
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${MINHA_CHAVE}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: mensagens })
        });

        const data = await response.json();
        if(!response.ok) throw new Error(data.error?.message || "Erro na conexão");
        return data.candidates[0].content.parts[0].text;
    }

    // Ação do Botão Principal
    btn.onclick = async () => {
        const brand = brandSel.options[brandSel.selectedIndex].text;
        const model = modelSel.value;
        const dtc = document.getElementById('dtc').value.toUpperCase();

        if(!model || !dtc) { alert("Escolha o veículo e o código DTC"); return; }

        btn.disabled = true;
        loader.style.display = 'block';
        resultArea.style.display = 'none';
        chatSection.style.display = 'none';
        chatHistory.innerHTML = "";

        const promptInicial = `Você é um mecânico master. Carro: ${brand} ${model}. Erro: ${dtc}. 
        Dê um laudo técnico completo (Significado, Sintomas, Causas e Como Consertar) em Português usando Markdown.`;

        try {
            historicoContexto = [{ role: "user", parts: [{ text: promptInicial }] }];
            const resposta = await enviarParaIA(historicoContexto);
            
            historicoContexto.push({ role: "model", parts: [{ text: resposta }] });
            
            output.innerHTML = marked.parse(resposta);
            resultArea.style.display = 'block';
            chatSection.style.display = 'block';
        } catch (e) {
            alert("Erro: " + e.message);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };

    // Chat de Seguimento
    document.getElementById('btnChat').onclick = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value) return;

        const pergunta = input.value;
        chatHistory.innerHTML += `<div class="msg"><span class="msg-user">Você:</span> ${pergunta}</div>`;
        input.value = "";
        
        document.getElementById('btnChat').disabled = true;
        document.getElementById('btnChat').innerText = "...";

        try {
            historicoContexto.push({ role: "user", parts: [{ text: pergunta }] });
            const respostaChat = await enviarParaIA(historicoContexto);
            
            historicoContexto.push({ role: "model", parts: [{ text: respostaChat }] });
            
            chatHistory.innerHTML += `<div class="msg"><span style="color:#38bdf8; font-weight:bold">IA:</span> ${marked.parse(respostaChat)}</div>`;
            chatHistory.scrollTop = chatHistory.scrollHeight;
        } catch (e) {
            chatHistory.innerHTML += `<div class="msg" style="color:red">Erro ao responder.</div>`;
        } finally {
            document.getElementById('btnChat').disabled = false;
            document.getElementById('btnChat').innerText = "Perguntar";
        }
    };

    initFipe();
</script>
</body>
</html>
