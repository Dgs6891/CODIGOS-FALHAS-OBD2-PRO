<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner IA Pro 2026 - Master</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; font-weight: 800; letter-spacing: -1px; }
        .version { font-size: 0.8rem; opacity: 0.6; }

        /* Seletor de Tipo Veículo */
        .vehicle-type { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .type-btn { flex: 1; padding: 15px; border-radius: 16px; border: 2px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: bold; }
        .type-btn.active { border-color: var(--primary); background: rgba(14, 165, 233, 0.1); color: var(--primary); }
        .type-btn i { font-size: 1.5rem; }

        .form-group { background: #334155; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; font-size: 0.85rem; }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; margin-bottom: 15px; outline: none; }
        
        button.main-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        button.main-btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* Resultado */
        #resultArea { margin-top: 30px; padding: 30px; border-radius: 16px; background: #ffffff; color: #1e293b; display: none; position: relative; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-copy { background: #e2e8f0; color: #475569; }
        .btn-pdf { background: #ef4444; color: white; }
        .btn-action:hover { opacity: 0.9; }

        /* Loader */
        .loader-container { display: none; text-align: center; margin: 25px 0; }
        .spinner { width: 45px; height: 45px; border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Chat */
        .chat-section { margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px; display: none; }
        .chat-history { background: #0f172a; border-radius: 12px; padding: 15px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #334155; }
        .msg { margin-bottom: 12px; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }

        footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔧 Scanner IA Master</h1>
        <div class="version">Diagnóstico Avançado Carros & Caminhões v2.6</div>
    </header>
    
    <div class="vehicle-type">
        <div class="type-btn active" id="btnCarro" onclick="setVehicleType('carros')">
            <span>🚗</span>
            Carros / Leves
        </div>
        <div class="type-btn" id="btnCaminhao" onclick="setVehicleType('caminhoes')">
            <span>🚚</span>
            Caminhões / Pesados
        </div>
    </div>

    <div class="form-group">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Fabricante:</label>
                <select id="brand"><option value="">Carregando...</option></select>
            </div>
            <div>
                <label>Modelo:</label>
                <select id="model" disabled><option>Selecione a marca</option></select>
            </div>
        </div>

        <label>Código de Falha (DTC):</label>
        <input type="text" id="dtc" placeholder="Ex: P0420 ou J1939 codes">
        
        <button class="main-btn" id="btnRun">GERAR LAUDO TÉCNICO</button>
    </div>

    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <div style="color: var(--primary); font-weight: bold;">IA analisando esquemas técnicos...</div>
    </div>

    <div id="resultArea">
        <div id="reportContent">
            <div id="output"></div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-action btn-copy" onclick="copyResult()">📋 Copiar Texto</button>
            <button class="btn-action btn-pdf" onclick="generatePDF()">📄 Gerar PDF Profissional</button>
        </div>
    </div>

    <div id="chatSection" class="chat-section">
        <label>💬 Consultar Especialista sobre este caso:</label>
        <div id="chatHistory" class="chat-history"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Sua dúvida..." style="margin:0">
            <button id="btnChat" style="width: 100px; margin:0; background: var(--primary); border:none; border-radius:10px; color:white; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <footer>
        Base de dados FIPE Parallelum & Google Gemini 2.5 Flash | 2026
    </footer>
</div>

<script>
    const MINHA_CHAVE = "AIzaSyDifEiasbUP7YVigrigpHPul5F3jVJWV7I";
    let currentType = 'carros';
    let historico = [];

    const brandSel = document.getElementById('brand');
    const modelSel = document.getElementById('model');

    // Troca entre Carro e Caminhão
    function setVehicleType(type) {
        currentType = type;
        document.getElementById('btnCarro').classList.toggle('active', type === 'carros');
        document.getElementById('btnCaminhao').classList.toggle('active', type === 'caminhoes');
        loadBrands();
    }

    // Carrega Marcas da FIPE dinamicamente
    async function loadBrands() {
        brandSel.innerHTML = '<option>Carregando...</option>';
        modelSel.disabled = true;
        try {
            const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${currentType}/marcas`);
            const data = await res.json();
            brandSel.innerHTML = '<option value="">Selecione a Marca</option>';
            data.forEach(m => brandSel.innerHTML += `<option value="${m.codigo}">${m.nome}</option>`);
        } catch (e) { console.error("Erro FIPE Marcas"); }
    }

    brandSel.onchange = async () => {
        if(!brandSel.value) return;
        modelSel.disabled = true;
        modelSel.innerHTML = '<option>Buscando modelos...</option>';
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${currentType}/marcas/${brandSel.value}/modelos`);
        const data = await res.json();
        modelSel.innerHTML = '<option value="">Selecione o Modelo</option>';
        data.modelos.forEach(m => modelSel.innerHTML += `<option value="${m.nome}">${m.nome}</option>`);
        modelSel.disabled = false;
    };

    // Chamada IA
    async function callAI(messages) {
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${MINHA_CHAVE}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: messages })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    document.getElementById('btnRun').onclick = async () => {
        const bName = brandSel.options[brandSel.selectedIndex].text;
        const mName = modelSel.value;
        const dtc = document.getElementById('dtc').value.toUpperCase();

        if(!mName || !dtc) { alert("Preencha marca, modelo e código."); return; }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('btnRun').disabled = true;
        document.getElementById('resultArea').style.display = 'none';

        const prompt = `Você é um engenheiro mecânico especialista em diagnósticos ${currentType === 'carros' ? 'automotivos leves' : 'de veículos pesados e diesel'}. 
        Veículo: ${bName} ${mName}. Código DTC: ${dtc}.
        Forneça um laudo técnico completo e organizado em Português com: Significado, Sintomas, Causas Prováveis e Procedimentos de Teste/Reparo.`;

        try {
            historico = [{ role: "user", parts: [{ text: prompt }] }];
            const resp = await callAI(historico);
            historico.push({ role: "model", parts: [{ text: resp }] });
            
            document.getElementById('output').innerHTML = marked.parse(resp);
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('chatSection').style.display = 'block';
        } catch (e) { alert("Erro na IA: " + e.message); }
        finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btnRun').disabled = false;
        }
    };

    // Chat de dúvidas
    document.getElementById('btnChat').onclick = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        const txt = input.value;
        document.getElementById('chatHistory').innerHTML += `<div class="msg"><b style="color:var(--primary)">Você:</b> ${txt}</div>`;
        input.value = "";

        try {
            historico.push({ role: "user", parts: [{ text: txt }] });
            const resp = await callAI(historico);
            historico.push({ role: "model", parts: [{ text: resp }] });
            document.getElementById('chatHistory').innerHTML += `<div class="msg"><b>IA:</b> ${marked.parse(resp)}</div>`;
            document.getElementById('chatHistory').scrollTop = document.getElementById('chatHistory').scrollHeight;
        } catch (e) { console.error(e); }
    };

    // Funcionalidades Extras
    function copyResult() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Texto copiado para a área de transferência!");
    }

    function generatePDF() {
        const element = document.getElementById('reportContent');
        const opt = {
            margin: 10,
            filename: `Laudo_Tecnico_${document.getElementById('dtc').value}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    loadBrands();
</script>
</body>
</html>
